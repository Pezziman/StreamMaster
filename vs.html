<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
		@font-face {
		font-family: 'Street Fighter 6';
		src: url('.../SF6_College.ttf') format('truetype');
		font-weight: normal;
		font-style: normal;
		}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1920px;
            height: 1080px;
            background: url('../images/vs_bg.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            font-family: 'Street Fighter 6', normal;
			letter-spacing: 1.5px;
            color: white;
            text-shadow: 2px 2px 2px black;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2;
        }
        .player {
            flex: 1; /* each takes half the width (960px) */
            position: relative;
            overflow: hidden;
        }
        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fill container, cropping if needed */
        }
        .player-name {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 24px;
            border-radius: 12px;
            white-space: nowrap;
            font-weight: bold;
            font-size: 48px; /* initial size, will be adjusted by script */
            text-align: center;
        }
        .vs {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 280px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 20px;
            z-index: 3;
            white-space: nowrap;
        }
        .foreground {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: url('../images/vs_fg.png') no-repeat center center;
            background-size: cover;
            z-index: 4;
        }
    </style>
    <script>
        async function loadData() {
            try {
                const resp = await fetch('../data.json');
                const data = await resp.json();
                document.getElementById('p1Name').innerText = data.vs.p1.name;
                document.getElementById('p2Name').innerText = data.vs.p2.name;
                const p1Char = data.vs.p1.character.toLowerCase().replace(/[ .]/g, '');
                const p2Char = data.vs.p2.character.toLowerCase().replace(/[ .]/g, '');
                document.getElementById('p1Char').src = `../characters/${p1Char}.png`;
                document.getElementById('p2Char').src = `../characters/${p2Char}.png`;


                resizeTextToFit(document.getElementById('p1Name'), 20, 72);
                resizeTextToFit(document.getElementById('p2Name'), 20, 72);
            } catch(e) { console.error(e); }
        }

        function resizeTextToFit(element, minFontSize, maxFontSize) {
            if (!element) return;

            const containerWidth = element.parentElement.clientWidth;
            let fontSize = maxFontSize;
            element.style.fontSize = fontSize + 'px';

            while (element.scrollWidth > containerWidth * 0.9 && fontSize > minFontSize) {
                fontSize -= 1;
                element.style.fontSize = fontSize + 'px';
            }
        }

        setInterval(loadData, 1000);
        window.onload = loadData;
    </script>
</head>
<body>
    <div class="container">
        <div class="player">
            <img id="p1Char" class="character-img" alt="Character">
            <div class="player-name" id="p1Name"></div>
        </div>
        <div class="vs">VS</div>
        <div class="player">
            <img id="p2Char" class="character-img" alt="Character">
            <div class="player-name" id="p2Name"></div>
        </div>
    </div>
    <div class="foreground"></div>
</body>
</html>
