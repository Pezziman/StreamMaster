<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
		@font-face {
		font-family: 'Street Fighter 6';
		src: url('.../SF6_College.ttf') format('truetype');
		font-weight: normal;
		font-style: normal;
		}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1920px;
            height: 100px;
            background: url('../images/scoreboard.png') no-repeat center center;
            background-size: cover;
            font-family: 'Street Fighter 6', normal;
			letter-spacing: 1.5px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 2px black;
            position: relative;
        }
        .scoreboard {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .p1-score, .p1-country, .p1-team-name,
        .match-info, .p2-team-name, .p2-country, .p2-score {
            position: absolute;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .p1-score, .p1-country, .p1-team-name,
        .p2-team-name, .p2-country, .p2-score {
            line-height: 45px;
            top: 11px;
            height: 45px;
        }
        .p1-score {
            left: 263px;
            width: 37px;
        }
        .p1-country {
            left: 320px;
            width: 37px;
        }
        .p1-team-name {
            left: 383px;
            width: 358px;
        }
        .match-info {
            left: 904px;
            width: 106px;
            top: 5px;                /* moved up 20px */
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: auto;             /* let content determine height */
            overflow: visible;        /* ensure text is not clipped */
            white-space: normal;      /* allow line breaks */
        }
        .p2-team-name {
            left: 1173px;
            width: 358px;
        }
        .p2-country {
            left: 1557px;
            width: 37px;
        }
        .p2-score {
            left: 1614px;
            width: 37px;
        }
        .p1-score, .p2-score {
            font-size: 32px;
        }
        .p1-country, .p2-country {
            font-size: 18px;
        }
        .p1-team-name, .p2-team-name {
            font-size: 20px;
        }
        .match-info {
            font-size: 16px;
        }
        #eventName {
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #bestOf {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    <script>
        async function loadData() {
            try {
                const resp = await fetch('../data.json');
                const data = await resp.json();

                document.getElementById('p1Score').innerText = data.scoreboard.p1.score;
                document.getElementById('p1Country').innerText = data.scoreboard.p1.country;
                document.getElementById('p1TeamName').innerText = `${data.scoreboard.p1.team} ${data.scoreboard.p1.name}`;

                document.getElementById('eventName').innerText = data.event.name;
                document.getElementById('bestOf').innerText = data.event.best_of;

                document.getElementById('p2TeamName').innerText = `${data.scoreboard.p2.team} ${data.scoreboard.p2.name}`;
                document.getElementById('p2Country').innerText = data.scoreboard.p2.country;
                document.getElementById('p2Score').innerText = data.scoreboard.p2.score;
                

                resizeTextToFit(document.querySelector('.p1-country'), 8, 18);
                resizeTextToFit(document.querySelector('.p1-team-name'), 10, 20);
                resizeTextToFit(document.querySelector('.p2-team-name'), 10, 20);
                resizeTextToFit(document.querySelector('.p2-country'), 8, 18);
                

                resizeTextToFit(document.getElementById('eventName'), 10, 18);
                resizeTextToFit(document.getElementById('bestOf'), 8, 14);
            } catch(e) { console.error(e); }
        }
        
        function resizeTextToFit(element, minFontSize, maxFontSize) {
            if (!element) return;
            let originalText = element.innerText;
            if (!originalText) return;
            let fontSize = maxFontSize;
            element.style.fontSize = fontSize + 'px';
            while (element.scrollWidth > element.clientWidth && fontSize > minFontSize) {
                fontSize -= 1;
                element.style.fontSize = fontSize + 'px';
            }
            if (element.scrollWidth > element.clientWidth) {
                element.style.textOverflow = 'ellipsis';
            } else {
                element.style.textOverflow = 'clip';
            }
        }
        
        setInterval(loadData, 1000);
        window.onload = loadData;
    </script>
</head>
<body>
    <div class="scoreboard">
        <div class="p1-score" id="p1Score"></div>
        <div class="p1-country" id="p1Country"></div>
        <div class="p1-team-name" id="p1TeamName"></div>
        <div class="match-info">
            <div id="eventName"></div>
            <div id="bestOf"></div>
        </div>
        <div class="p2-team-name" id="p2TeamName"></div>
        <div class="p2-country" id="p2Country"></div>
        <div class="p2-score" id="p2Score"></div>
    </div>
</body>
</html>
