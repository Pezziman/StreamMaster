<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
		@font-face {
		font-family: 'Street Fighter 6';
		src: url('.../SF6_College.ttf') format('truetype');
		font-weight: normal;
		font-style: normal;
		}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1920px;
            height: 1080px;
            background: url('../images/bracket_bg.jpg') no-repeat center center;
            background-size: cover;
            font-family: 'Street Fighter 6', normal;
			letter-spacing: 1.25px;
            color: white;
			text-shadow: 3px 3px 3px 3px black;
            overflow: hidden;
            position: relative;
        }
		
        .event-info {
            position: absolute;
            top: 25px;
            left: 35px;
            font-size: 68px;
            font-weight: bold;
            padding: 10px 0px 25px 0px;
            border-radius: 5px;
            z-index: 10;
        }
		
        .bracket {
            position: absolute;
            top: 235px;
            left: 35px;
            right: 20px;
            bottom: 10px;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
		

        .winners-row, .losers-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }
		

        .column {
            border-radius: 8px;
            padding: 5px;
            width: 425px;
        }
		

        .single-match-column {
            padding-top: 30px;   /* adjust this value to move header down */
        }
		
        .column h3 {
            text-align: center;
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 4px;
            font-size: 32px;
        }
        .match-stack {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .single-match-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .match {
            background: rgba(0,0,0,0.7);
            border: 1px solid gold;
            border-radius: 5px;
            margin: 5px 0;
            padding: 8px;
        }
        .player-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 18px;
            padding: 2px;
            border-radius: 3px;
        }
        .winner {
            background: rgba(255,215,0,0.3);
            font-weight: bold;
        }
        .player-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-left: 5px;
        }
        .player-score {
            margin-left: 8px;
            font-weight: bold;
            width: 30px;
            text-align: right;
        }
		
        .country {
            font-size: 10px;
            margin-left: 5px;
            opacity: 0.8;
        }
		
        .character-portrait {
            width: 30px;
            height: 30px;
            object-fit: cover;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
    <script>
        let bracketData = null;

        async function loadData() {
            try {
                const resp = await fetch('../data.json');
                const data = await resp.json();
                bracketData = data.bracket;
                renderBracket();
                document.getElementById('eventName').innerText = data.event.name;
            } catch(e) { console.error(e); }
        }

        function getPlayerByIdx(idx) {
            if (idx === undefined || idx === null) return null;
            return bracketData.players[idx] || null;
        }

        function resolveParticipant(participant) {
            if (!participant) return null;
            if (participant.type === 'player') {
                return getPlayerByIdx(participant.index);
            } else if (participant.type === 'match') {
                let match;
                if (participant.matchId in bracketData.matches.winners) {
                    match = bracketData.matches.winners[participant.matchId];
                } else if (participant.matchId in bracketData.matches.losers) {
                    match = bracketData.matches.losers[participant.matchId];
                } else if (participant.matchId === 'GF') {
                    match = bracketData.matches.grandFinal.GF;
                } else {
                    return null;
                }
                if (!match || match.winner === null) return null;
                const side = (participant.outcome === 'winner') ? match.winner : (match.winner === 1 ? 2 : 1);
                const subParticipant = match.participants[side-1];
                return resolveParticipant(subParticipant);
            }
            return null;
        }

        function renderMatch(matchId, matchData, section) {
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match';
            const p1 = resolveParticipant(matchData.participants[0]);
            const p2 = resolveParticipant(matchData.participants[1]);
            const score1 = matchData.score1;
            const score2 = matchData.score2;
            const winner = matchData.winner;
            const p1Win = (winner === 1);
            const p2Win = (winner === 2);

            function createPlayerEntry(player, score, isWinner) {
                const div = document.createElement('div');
                div.className = `player-entry ${isWinner ? 'winner' : ''}`;
                if (player) {
                    const portraitFile = player.character.toLowerCase().replace(/[ .]/g, '');
                    const img = document.createElement('img');
                    img.className = 'character-portrait';
                    img.src = `../character_portraits/${portraitFile}.png`;
                    img.alt = player.character;
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'player-name';
                    nameSpan.innerHTML = `${player.team} ${player.name} <span class="country">${player.country}</span>`;
                    const scoreSpan = document.createElement('span');
                    scoreSpan.className = 'player-score';
                    scoreSpan.innerText = score;
                    div.appendChild(img);
                    div.appendChild(nameSpan);
                    div.appendChild(scoreSpan);
                } else {
                    div.innerHTML = '<span class="player-name">TBD</span>';
                }
                return div;
            }

            matchDiv.appendChild(createPlayerEntry(p1, score1, p1Win));
            matchDiv.appendChild(createPlayerEntry(p2, score2, p2Win));
            return matchDiv;
        }

        function renderBracket() {
            const container = document.getElementById('bracketContainer');
            container.innerHTML = '';


            const winnersRow = document.createElement('div');
            winnersRow.className = 'winners-row';


            const semisCol = document.createElement('div');
            semisCol.className = 'column';
            semisCol.innerHTML = '<h3>Winners Semis</h3>';
            const semisStack = document.createElement('div');
            semisStack.className = 'match-stack';
            const wsf1 = bracketData.matches.winners['WSF1'];
            if (wsf1) semisStack.appendChild(renderMatch('WSF1', wsf1, 'winners'));
            const wsf2 = bracketData.matches.winners['WSF2'];
            if (wsf2) semisStack.appendChild(renderMatch('WSF2', wsf2, 'winners'));
            semisCol.appendChild(semisStack);
            winnersRow.appendChild(semisCol);


            const wfCol = document.createElement('div');
            wfCol.className = 'column single-match-column';
            wfCol.innerHTML = '<h3>Winners Final</h3>';
            const wfContainer = document.createElement('div');
            wfContainer.className = 'single-match-container';
            const wf = bracketData.matches.winners['WF'];
            if (wf) wfContainer.appendChild(renderMatch('WF', wf, 'winners'));
            wfCol.appendChild(wfContainer);
            winnersRow.appendChild(wfCol);


            const gfCol = document.createElement('div');
            gfCol.className = 'column single-match-column';
            gfCol.innerHTML = '<h3>Grand Final</h3>';
            const gfContainer = document.createElement('div');
            gfContainer.className = 'single-match-container';
            const gfMatch = bracketData.matches.grandFinal.GF;
            if (gfMatch) gfContainer.appendChild(renderMatch('GF', gfMatch, 'grandFinal'));
            gfCol.appendChild(gfContainer);
            winnersRow.appendChild(gfCol);


            let columnCount = 3;


            const resetMatch = bracketData.matches.grandFinal.GF.resetMatch;
            if (resetMatch) {
                const resetCol = document.createElement('div');
                resetCol.className = 'column single-match-column';
                resetCol.innerHTML = '<h3>Grand Final Reset</h3>';
                const resetContainer = document.createElement('div');
                resetContainer.className = 'single-match-container';
                resetContainer.appendChild(renderMatch('Reset', resetMatch, 'grandFinal'));
                resetCol.appendChild(resetContainer);
                winnersRow.appendChild(resetCol);
                columnCount++;
            }


            while (columnCount < 6) {
                const empty = document.createElement('div');
                empty.style.visibility = 'hidden';
                winnersRow.appendChild(empty);
                columnCount++;
            }

            container.appendChild(winnersRow);


            const losersRow = document.createElement('div');
            losersRow.className = 'losers-row';


            const lqfCol = document.createElement('div');
            lqfCol.className = 'column';
            lqfCol.innerHTML = '<h3>Losers Bracket</h3>';
            const lqfStack = document.createElement('div');
            lqfStack.className = 'match-stack';
            const lqf1 = bracketData.matches.losers['LQF1'];
            if (lqf1) lqfStack.appendChild(renderMatch('LQF1', lqf1, 'losers'));
            const lqf2 = bracketData.matches.losers['LQF2'];
            if (lqf2) lqfStack.appendChild(renderMatch('LQF2', lqf2, 'losers'));
            lqfCol.appendChild(lqfStack);
            losersRow.appendChild(lqfCol);


            const lsfCol = document.createElement('div');
            lsfCol.className = 'column';
            lsfCol.innerHTML = '<h3>Losers QF</h3>';
            const lsfStack = document.createElement('div');
            lsfStack.className = 'match-stack';
            const lsf1 = bracketData.matches.losers['LSF1'];
            if (lsf1) lsfStack.appendChild(renderMatch('LSF1', lsf1, 'losers'));
            const lsf2 = bracketData.matches.losers['LSF2'];
            if (lsf2) lsfStack.appendChild(renderMatch('LSF2', lsf2, 'losers'));
            lsfCol.appendChild(lsfStack);
            losersRow.appendChild(lsfCol);


            const lfCol = document.createElement('div');
            lfCol.className = 'column single-match-column';
            lfCol.innerHTML = '<h3>Losers SF</h3>';
            const lfContainer = document.createElement('div');
            lfContainer.className = 'single-match-container';
            const lfMatch = bracketData.matches.losers['LF'];
            if (lfMatch) lfContainer.appendChild(renderMatch('LF', lfMatch, 'losers'));
            lfCol.appendChild(lfContainer);
            losersRow.appendChild(lfCol);


            const llCol = document.createElement('div');
            llCol.className = 'column single-match-column';
            llCol.innerHTML = '<h3>Losers Final</h3>';
            const llContainer = document.createElement('div');
            llContainer.className = 'single-match-container';
            const llMatch = bracketData.matches.losers['LL'];
            if (llMatch) llContainer.appendChild(renderMatch('LL', llMatch, 'losers'));
            llCol.appendChild(llContainer);
            losersRow.appendChild(llCol);


            for (let i = 0; i < 2; i++) {
                const empty = document.createElement('div');
                empty.style.visibility = 'hidden';
                losersRow.appendChild(empty);
            }

            container.appendChild(losersRow);
        }

        setInterval(loadData, 2000);
        window.onload = loadData;
    </script>
</head>
<body>
    <div class="event-info">
        <div id="eventName"></div>
        <div>TOP 8</div>
    </div>
    <div id="bracketContainer" class="bracket"></div>
</body>
</html>
