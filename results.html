<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'Street Fighter 6';
            src: url('.../SF6_College.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: url('../images/results_bg.jpg') no-repeat center center;
            background-size: cover;
            width: 1920px;
            height: 1080px;
            font-family: 'Street Fighter 6', normal;
            letter-spacing: 1.25px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .event-name {
            position: absolute;
            top: 30px;
            left: 73px;
            font-size: 96px;
            padding: 8px 16px;
            border-radius: 5px;
            z-index: 10;
        }

        .champion-area {
            position: absolute;
            left: 59px;
            top: 247px;
            width: 685px;
            height: 685px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .champion-area .character-img {
            width: 100%;
            max-width: 685px;
            height: auto;
            object-fit: contain;
        }
        .champion-info {
            font-size: 64px;
            margin-top: 5px;
            padding: 10px;
            border-radius: 10px;
        }

        .runner-up-container {
            position: absolute;
            left: 752px;
            top: 239px;
            width: 1087px;
            height: 348px;
            display: flex;
            justify-content: space-between;
        }
        .runner-up-card {
            width: 338px;
            height: 338px;
            text-align: left;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .runner-up-card .character-img {
            width: 112%;
            object-fit: contain;
        }
        .runner-up-card .player-name {
            font-size: 24px;
            margin-top: 10px;
        }

        .bottom-container {
            position: absolute;
            left: 739.5px;
            top: 596px;
            width: 720px;
            display: flex;
            justify-content: space-between;
        }
        .bottom-card {
            width: 350px;
            text-align: center;
            padding: 10px;
        }
        .bottom-card .character-img {
            width: 258px;
            height: 258px;
            object-fit: cover;
        }
        .bottom-card .player-name {
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
    <script>

        function formatPlayerInfo(player) {
            const parts = [];
            if (player.country && player.country.trim() !== '') parts.push(player.country);
            if (player.team && player.team.trim() !== '') parts.push(player.team);
            if (player.name && player.name.trim() !== '') parts.push(player.name);
            return parts.join(' · ');
        }

        async function loadData() {
            try {
                const resp = await fetch('../data.json');
                const data = await resp.json();
                document.getElementById('eventName').innerText = data.event.name;

                const players = data.results.players;
                if (!players.length) return;


                const champion = players[0];
                const champCharFile = champion.character.toLowerCase().replace(/[ .]/g, '');
                document.getElementById('champChar').src = `../character_portraits/${champCharFile}.png`;
                document.getElementById('champName').innerHTML = formatPlayerInfo(champion);


                const runnerUpContainer = document.getElementById('runnerUpContainer');
                runnerUpContainer.innerHTML = '';
                for (let i = 1; i <= 3 && i < players.length; i++) {
                    const p = players[i];
                    const charFile = p.character.toLowerCase().replace(/[ .]/g, '');
                    const card = document.createElement('div');
                    card.className = 'runner-up-card';
                    card.innerHTML = `
                        <img class="character-img" src="../character_portraits/${charFile}.png" alt="${p.character}">
                        <div class="player-name">${formatPlayerInfo(p)}</div>
                    `;
                    runnerUpContainer.appendChild(card);
                }


                const bottomContainer = document.getElementById('bottomContainer');
                bottomContainer.innerHTML = '';
                for (let i = 4; i < players.length && i <= 7; i++) {
                    const p = players[i];
                    const charFile = p.character.toLowerCase().replace(/[ .]/g, '');
                    const card = document.createElement('div');
                    card.className = 'bottom-card';
                    card.innerHTML = `
                        <img class="character-img" src="../character_portraits/${charFile}.png" alt="${p.character}">
                        <div class="player-name">${formatPlayerInfo(p)}</div>
                    `;
                    bottomContainer.appendChild(card);
                }
            } catch(e) { console.error(e); }
        }

        setInterval(loadData, 2000);
        window.onload = loadData;
    </script>
</head>
<body>
    <div class="event-name" id="eventName"></div>
    <div class="champion-area">
        <img id="champChar" class="character-img" alt="Champion Character">
        <div class="champion-info" id="champName"></div>
    </div>
    <div class="runner-up-container" id="runnerUpContainer"></div>
    <div class="bottom-container" id="bottomContainer"></div>
</body>
</html>
